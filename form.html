<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ｜Revo POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0D0D0D;
      --white: #FFFFFF;
      --gray-50: #F7F7F7;
      --gray-100: #EEEEEE;
      --gray-300: #CCCCCC;
      --gray-500: #888888;
      --gray-700: #444444;
      --accent: #FF3B00;
      --accent-light: #FFF0EC;
      --green: #00A878;
      --radius: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--gray-50);
      color: var(--black);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 60px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--gray-100);
    }
    .nav-logo {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: var(--black);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .nav-logo span { color: var(--accent); }
    .back-link {
      background: var(--black);
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      padding: 9px 20px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .back-link:hover { background: var(--accent); }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 1.5rem 48px;
    }

    .form-card {
      width: 100%;
      max-width: 560px;
      background: var(--white);
      border-radius: 20px;
      padding: 48px 40px;
      border: 1px solid var(--gray-100);
      box-shadow: 0 8px 40px rgba(0,0,0,0.06);
    }

    /* ── HEADER ── */
    .form-label {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .form-title {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(24px, 5vw, 32px);
      font-weight: 700;
      line-height: 1.2;
      color: var(--black);
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }
    .form-desc {
      font-size: 14px;
      color: var(--gray-700);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    /* ── FORM ── */
    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field label {
      font-size: 13px;
      font-weight: 700;
      color: var(--black);
    }
    .field label .req {
      color: var(--accent);
      margin-left: 3px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px 16px;
      background: var(--gray-50);
      border: 1.5px solid var(--gray-100);
      border-radius: var(--radius);
      color: var(--black);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input::placeholder, textarea::placeholder {
      color: var(--gray-300);
    }
    input:focus, textarea:focus {
      border-color: var(--accent);
      background: var(--white);
    }
    textarea {
      resize: vertical;
      min-height: 130px;
      line-height: 1.7;
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ── SUBMIT ── */
    .submit-wrap { margin-top: 8px; }
    .btn-submit {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(255,59,0,0.25);
    }
    .btn-submit:hover {
      background: #CC2E00;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(255,59,0,0.35);
    }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── RESULT ── */
    .result-msg {
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      display: none;
    }
    .result-msg.success {
      display: block;
      background: rgba(0,168,120,0.08);
      border: 1px solid rgba(0,168,120,0.3);
      color: var(--green);
    }
    .result-msg.error {
      display: block;
      background: var(--accent-light);
      border: 1px solid rgba(255,59,0,0.2);
      color: var(--accent);
    }

    /* ── SUCCESS SCREEN ── */
    .success-screen {
      display: none;
      text-align: center;
      padding: 24px 0;
    }
    .success-screen .check {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(0,168,120,0.1);
      border: 2px solid var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 26px;
      color: var(--green);
    }
    .success-screen h2 {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--black);
      margin-bottom: 10px;
    }
    .success-screen p {
      font-size: 14px;
      color: var(--gray-700);
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .btn-back {
      display: inline-block;
      padding: 14px 32px;
      background: var(--black);
      border-radius: var(--radius);
      color: var(--white);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      transition: background 0.2s;
    }
    .btn-back:hover { background: var(--accent); }

    /* ── FOOTER ── */
    footer {
      padding: 20px;
      text-align: center;
      font-size: 12px;
      color: var(--gray-500);
      border-top: 1px solid var(--gray-100);
    }

    @media (max-width: 500px) {
      .row-2 { grid-template-columns: 1fr; }
      .form-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Revo<span>.</span></a>
  <a href="index.html" class="back-link">← トップへ戻る</a>
</nav>

<main>
  <div class="form-card">

    <!-- FORM VIEW -->
    <div id="formView">
      <span class="form-label">Contact</span>
      <h1 class="form-title">お問い合わせ</h1>
      <p class="form-desc">
        内容を入力して送信してください。<br>
        通常1〜2営業日以内にご返信いたします。
      </p>

      <form id="contactForm" novalidate>
        <div class="row-2">
          <div class="field">
            <label>お名前<span class="req">*</span></label>
            <input type="text" id="cf-name" placeholder="山田 太郎" required>
          </div>
          <div class="field">
            <label>店舗名</label>
            <input type="text" id="cf-shop" placeholder="〇〇カフェ">
          </div>
        </div>

        <div class="field">
          <label>メールアドレス<span class="req">*</span></label>
          <input type="email" id="cf-email" placeholder="example@email.com" required>
        </div>

        <div class="field">
          <label>お問い合わせ内容<span class="req">*</span></label>
          <textarea id="cf-msg" placeholder="ご質問・ご要望をお気軽にどうぞ" required></textarea>
        </div>

        <div class="submit-wrap">
          <button type="submit" class="btn-submit" id="cf-submit">送信する →</button>
        </div>

        <div class="result-msg" id="cf-result"></div>
      </form>
    </div>

    <!-- SUCCESS VIEW -->
    <div class="success-screen" id="successView">
      <div class="check">✓</div>
      <h2>送信完了しました</h2>
      <p>
        お問い合わせありがとうございます。<br>
        1〜2営業日以内にご返信いたします。
      </p>
      <a href="index.html" class="btn-back">トップページへ戻る</a>
    </div>

  </div>
</main>

<footer>© 2025 Revo</footer>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
  var firebaseConfig = {
    apiKey:            "AIzaSyCUV0fduR4bTtfAsI7bH3fDXs6hm2rrLE8",
    authDomain:        "revoreji.firebaseapp.com",
    projectId:         "revoreji",
    storageBucket:     "revoreji.firebasestorage.app",
    messagingSenderId: "91184668244",
    appId:             "1:91184668244:web:d9b5dcd32d8875b8e9d7c1"
  };

  firebase.initializeApp(firebaseConfig);
  var db = firebase.firestore();

  document.getElementById('contactForm').addEventListener('submit', function(e) {
    e.preventDefault();

    var name   = document.getElementById('cf-name').value.trim();
    var shop   = document.getElementById('cf-shop').value.trim();
    var email  = document.getElementById('cf-email').value.trim();
    var msg    = document.getElementById('cf-msg').value.trim();
    var result = document.getElementById('cf-result');
    var btn    = document.getElementById('cf-submit');

    if (!name || !email || !msg) {
      result.className = 'result-msg error';
      result.textContent = '＊ 印の項目を入力してください。';
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      result.className = 'result-msg error';
      result.textContent = 'メールアドレスの形式が正しくありません。';
      return;
    }

    btn.disabled = true;
    btn.textContent = '送信中...';
    result.className = 'result-msg';
    result.textContent = '';

    db.collection('inquiries').add({
      name:      name,
      shop:      shop || null,
      email:     email,
      message:   msg,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      status:    'new'
    })
    .then(function() {
      document.getElementById('formView').style.display = 'none';
      document.getElementById('successView').style.display = 'block';
    })
    .catch(function(err) {
      console.error(err);
      result.className = 'result-msg error';
      result.textContent = '送信に失敗しました。メールにてお問い合わせください。';
      btn.disabled = false;
      btn.textContent = '送信する →';
    });
  });
</script>

</body>
</html>
