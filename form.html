<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ｜Revo POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #E8190A;
      --bg: #0a0a0a;
      --card: #141414;
      --border: rgba(255,255,255,0.1);
      --text: #e8e8e8;
      --muted: rgba(255,255,255,0.45);
      --success: #4caf7d;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2.5rem;
      background: rgba(34,34,34,0.95);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border-dark);
      transition: background 0.3s;
    }
    .nav-logo-dark { height: 34px; display: block; }
    .back-link {
      background: var(--red);
      color: #fff;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      padding: 0.55rem 1.5rem;
      text-decoration: none;
      transition: background 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }
    .back-link:hover { background: var(--red-dark); box-shadow: 0 0 20px var(--red-glow); }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    .form-card {
      width: 100%;
      max-width: 540px;
    }

    .form-header {
      margin-bottom: 2.5rem;
    }
    .form-label {
      display: inline-block;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      color: var(--red);
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    .form-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 800;
      line-height: 1.2;
      color: #fff;
      margin-bottom: 0.8rem;
    }
    .form-desc {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.7;
    }

    /* ── FORM ── */
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .field label {
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.6);
    }
    .field label .req {
      color: var(--red);
      margin-left: 0.2em;
    }

    input, textarea, select {
      width: 100%;
      padding: 0.85rem 1.1rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.2); }
    input:focus, textarea:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(232,25,10,0.12);
    }
    textarea {
      resize: vertical;
      min-height: 120px;
      line-height: 1.7;
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    /* ── SUBMIT ── */
    .submit-wrap {
      margin-top: 0.5rem;
    }
    .btn-submit {
      width: 100%;
      padding: 1rem;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }
    .btn-submit:hover { opacity: 0.88; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── RESULT ── */
    .result-msg {
      margin-top: 1rem;
      padding: 0.85rem 1.1rem;
      border-radius: 10px;
      font-size: 0.88rem;
      line-height: 1.6;
      display: none;
    }
    .result-msg.success {
      display: block;
      background: rgba(76,175,125,0.12);
      border: 1px solid rgba(76,175,125,0.35);
      color: var(--success);
    }
    .result-msg.error {
      display: block;
      background: rgba(232,25,10,0.1);
      border: 1px solid rgba(232,25,10,0.3);
      color: #ff7a6e;
    }

    /* ── SUCCESS SCREEN ── */
    .success-screen {
      display: none;
      text-align: center;
      padding: 2rem 0;
    }
    .success-screen .check {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(76,175,125,0.15);
      border: 2px solid var(--success);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 1.6rem;
    }
    .success-screen h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      color: #fff;
      margin-bottom: 0.7rem;
    }
    .success-screen p {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 1.8rem;
    }
    .btn-back {
      display: inline-block;
      padding: 0.75rem 2rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-back:hover { border-color: rgba(255,255,255,0.4); color: #fff; }

    /* ── FOOTER ── */
    footer {
      padding: 1.2rem 2rem;
      text-align: center;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.06em;
    }

    @media (max-width: 500px) {
      .row-2 { grid-template-columns: 1fr; }
      header { padding: 1.2rem 1.2rem; }
      main { padding: 2.5rem 1.2rem; }
    }
  </style>
</head>

          内容を入力して送信してください。<br>
          通常1〜2営業日以内にご返信いたします。
        </p>
      </div>

      <form id="contactForm" novalidate>
        <div class="row-2">
          <div class="field">
            <label>お名前<span class="req">*</span></label>
            <input type="text" id="cf-name" placeholder="山田 太郎" required>
          </div>
          <div class="field">
            <label>店舗名</label>
            <input type="text" id="cf-shop" placeholder="〇〇カフェ">
          </div>
        </div>

        <div class="field">
          <label>メールアドレス<span class="req">*</span></label>
          <input type="email" id="cf-email" placeholder="example@email.com" required>
        </div>

        <div class="field">
          <label>お問い合わせ内容<span class="req">*</span></label>
          <textarea id="cf-msg" placeholder="ご質問・ご要望をお気軽にどうぞ" required></textarea>
        </div>

        <div class="submit-wrap">
          <button type="submit" class="btn-submit" id="cf-submit">送信する</button>
        </div>

        <div class="result-msg" id="cf-result"></div>
      </form>
    </div>

    <!-- SUCCESS VIEW -->
    <div class="success-screen" id="successView">
      <div class="check">✓</div>
      <h2>送信完了しました</h2>
      <p>
        お問い合わせありがとうございます。<br>
        1〜2営業日以内にご返信いたします。
      </p>
      <a href="index.html" class="btn-back">トップページへ戻る</a>
    </div>

  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
  // ============================================================
  //  Firebase 設定 ← ご自身のプロジェクト設定に書き換えてください
  // ============================================================
  var firebaseConfig = {
    apiKey:            "AIzaSyCUV0fduR4bTtfAsI7bH3fDXs6hm2rrLE8",
    authDomain:        "revoreji.firebaseapp.com",
    projectId:         "revoreji",
    storageBucket:     "revoreji.firebasestorage.app",
    messagingSenderId: "91184668244",
    appId:             "1:91184668244:web:d9b5dcd32d8875b8e9d7c1"
  };
  // ============================================================

  firebase.initializeApp(firebaseConfig);
  var db = firebase.firestore();

  document.getElementById('contactForm').addEventListener('submit', function(e) {
    e.preventDefault();

    var name  = document.getElementById('cf-name').value.trim();
    var shop  = document.getElementById('cf-shop').value.trim();
    var email = document.getElementById('cf-email').value.trim();
    var msg   = document.getElementById('cf-msg').value.trim();
    var result = document.getElementById('cf-result');
    var btn    = document.getElementById('cf-submit');

    // バリデーション
    if (!name || !email || !msg) {
      result.className = 'result-msg error';
      result.textContent = '＊ 印の項目を入力してください。';
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      result.className = 'result-msg error';
      result.textContent = 'メールアドレスの形式が正しくありません。';
      return;
    }

    btn.disabled = true;
    btn.textContent = '送信中...';
    result.className = 'result-msg';
    result.textContent = '';

    db.collection('inquiries').add({
      name:      name,
      shop:      shop || null,
      email:     email,
      message:   msg,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      status:    'new'
    })
    .then(function() {
      document.getElementById('formView').style.display = 'none';
      document.getElementById('successView').style.display = 'block';
    })
    .catch(function(err) {
      console.error(err);
      result.className = 'result-msg error';
      result.textContent = '送信に失敗しました。LINEよりお問い合わせください。';
      btn.disabled = false;
      btn.textContent = '送信する';
    });
  });
</script>

</body>
</html>
