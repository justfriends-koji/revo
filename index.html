<style>
:root { --primary: #f39c12; --secondary: #fbb03b; --bg: #f8f8f8; --text: #333; --accent: #2ecc71; --gray: #999; --danger: #e74c3c; --info: #3498db; --dark: #444; }

body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--text); -webkit-user-select: none; overflow: hidden; height: 100vh; height: 100dvh; }
header { background: #fff; padding: 0 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; font-weight: bold; height: 55px; flex-shrink: 0; }
.header-left { display: flex; align-items: center; gap: 10px; }
.back-btn { text-decoration: none; color: var(--text); font-size: 26px; cursor: pointer; padding: 10px 5px; }
.reload-btn { font-size: 28px; cursor: pointer; padding: 10px; color: var(--primary); font-weight: bold; }
.admin-btn { font-size: 13px; cursor: pointer; padding: 8px 15px; border: 1px solid var(--primary); border-radius: 25px; color: var(--primary); background: #fff; white-space: nowrap; }
.view { display: none; height: 100vh; height: 100dvh; width: 100vw; flex-direction: column; position: absolute; top: 0; left: 0; background: var(--bg); }

.countdown-badge.warning { background: #fff3e0; color: #e65100; }
.countdown-badge.danger { background: #ffebee; color: #c62828; animation: blink 0.8s infinite; }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
.table-btn.occupied { background: #e8f5e9; border-color: #27ae60; }
.price-badge { display: block; font-size: 11px; color: #e67e22; margin-top: 5px; font-weight: bold; }

.item-grid { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; align-content: start; background: #fff; padding-bottom: 150px !important; }
.item-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

footer { width: 100%; display: flex; flex-direction: column; z-index: 100; box-shadow: 0 -3px 10px rgba(0,0,0,0.1); flex-shrink: 0; }
.footer-history { background: var(--dark); color: #fff; padding: 10px 15px; display: flex; justify-content: space-between; font-size: 14px; cursor: pointer; }
.footer-cart { background: var(--secondary); color: #fff; padding: 18px 15px; display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; cursor: pointer; }

.admin-nav { display: flex; background: #fff; border-bottom: 1px solid #ddd; flex-shrink: 0; }
.admin-nav-btn { flex: 1; padding: 15px; text-align: center; font-size: 14px; font-weight: bold; color: #888; cursor: pointer; border-bottom: 3px solid transparent; }

.sale-table-badge { background: #eee; padding: 4px 10px; border-radius: 8px; font-size: 14px; font-weight: bold; }

.overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; padding: 20px 0; }
.modal { background: #fff; width: 90%; max-width: 340px; border-radius: 20px; padding: 20px; text-align: center; position: relative; max-height: 90dvh; overflow-y: auto; }
.receipt-sample { background: #fff; padding: 15px; color: #000; font-family: monospace; text-align: left; font-size: 11px; border: 1px dashed #ccc; width: 100%; }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection, addDoc, query, orderBy, getDocs, where, Timestamp, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDscuD0S3D66lcamtG4T26WLfZH8rjOy28",
authDomain: "mifune-ap2.firebaseapp.com",
projectId: "mifune-ap2",
storageBucket: "mifune-ap2.firebasestorage.app",
messagingSenderId: "25505732783",
appId: "1:25505732783:web:47278f159ad7a26f279c5a",
measurementId: "G-7F8BM4SBGR"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.currentUser = null;
window.isEditing = false;

onAuthStateChanged(auth, (user) => {
window.currentUser = user;
const btnLabel = document.getElementById('admin-btn-label');
if(user) {
btnLabel.innerText = "売上管理(店主)";
btnLabel.style.background = "#e8f5e9";
if(document.getElementById('view-login').style.display !== 'none') showAdmin('day');
} else {
btnLabel.innerText = "売上管理";
btnLabel.style.background = "#fff";
}
});

window.loginOwner = async (email, pass) => {
try {
await signInWithEmailAndPassword(auth, email, pass);
alert("ログイン成功");
showAdmin('day');
} catch(e) { alert("ログイン失敗: パスワードをご確認ください"); }
};

window.logoutOwner = () => { signOut(auth); alert("ログアウト完了"); showIndex(); };

onSnapshot(collection(db, "tables"), (snapshot) => {
if(window.isEditing) return;
const tablesList = ['C-a', 'C-b', 'C-c', '01', '02', '03', '04', '05', '06', '07', 'テイクアウト', '無人'];
const cloudIds = snapshot.docs.map(d => d.id);
tablesList.forEach(tId => {
if(!cloudIds.includes(tId)) {
localStorage.removeItem('history_'+tId); localStorage.removeItem('guests_'+tId); localStorage.removeItem('checkin_'+tId);
}
});
snapshot.forEach((docSnap) => {
const tId = docSnap.id; const data = docSnap.data();
localStorage.setItem('history_'+tId, JSON.stringify(data.history || []));
localStorage.setItem('guests_'+tId, data.guests || 0);
localStorage.setItem('checkin_'+tId, data.checkin || "--:--");

// updatedAtでデバイス時計とサーバー時計のズレを随時補正
if (data.updatedAt && typeof data.updatedAt.toMillis === 'function') {
    window.deviceClockOffset = Date.now() - data.updatedAt.toMillis();
}

// 飲み放題カウントダウン同期
if (data.nomihodaiStart) {
    const startMs = data.nomihodaiStart.toMillis();
    localStorage.setItem('nomi_start_ms_' + tId, startMs.toString());
    localStorage.setItem('nomi_total_min_' + tId, (data.nomiTotalMinutes || NOMIHODAI_MINUTES).toString());
    if (!localStorage.getItem('nomi_offset_' + tId)) {
        localStorage.setItem('nomi_offset_' + tId, (Date.now() - startMs).toString());
    }
} else {
    localStorage.removeItem('nomi_start_ms_' + tId);
    localStorage.removeItem('nomi_offset_' + tId);
    localStorage.removeItem('nomi_total_min_' + tId);
}

// ▼ モバイルオーダー検知・自動キッチン印刷
const mobileOrders = data.mobileOrders || [];
if (mobileOrders.length > 0) {
    // 先にクリアしてから印刷（二重印刷防止）
    setDoc(doc(db, "tables", tId), { mobileOrders: [] }, { merge: true }).then(() => {
        autoKitchenPrint(tId, mobileOrders);
    });
}
// ▲ モバイルオーダー検知

});
renderIndex(); updateFooter();
});

window.cloudSync = async (tableId) => {
try {
await setDoc(doc(db, "tables", tableId), {
history: JSON.parse(localStorage.getItem('history_' + tableId) || '[]'),
guests: parseInt(localStorage.getItem('guests_' + tableId)) || 0,
checkin: localStorage.getItem('checkin_' + tableId) || "--:--",
updatedAt: Timestamp.now()
}, { merge: true });
} catch(e) { console.warn('cloudSync失敗:', e.message); }
};

// ▼▼▼ モバイルオーダー自動キッチン印刷 ▼▼▼
function autoKitchenPrint(tableId, mobileOrders) {
    const b = new StarWebPrintBuilder();
    let r = '';
    const checkin = localStorage.getItem('checkin_' + tableId) || '--:--';

    // 先にhistoryへ追記してcloudSync（印刷失敗でも注文は反映）
    const hist = JSON.parse(localStorage.getItem('history_' + tableId) || '[]');
    mobileOrders.forEach(order => {
        order.items.forEach(item => {
            const exist = hist.find(h => h.name === item.name);
            if (exist) exist.qty += item.qty;
            else hist.push({ name: item.name, price: item.price, qty: item.qty, rate: item.rate || 0.10 });
            // キッチン伝票作成
            r += b.createInitializationElement();
            r += b.createAlignmentElement({position: 'left'});
            r += b.createTextElement({data: `[${tableId}][M] ${item.name} ${item.qty}\n`, width: 2, height: 2});
            r += b.createTextElement({data: `--------------------------\n`});
            r += b.createTextElement({data: `${new Date().toLocaleTimeString()} (入店:${checkin})\n`});
            r += b.createCutPaperElement({type: 'partial'});
        });
    });
    localStorage.setItem('history_' + tableId, JSON.stringify(hist));
    window.cloudSync(tableId); // 印刷結果に関わらず即反映

    if (!r) return;
    const t = new StarWebPrintTrader({url: KITCHEN_PRINTER_URL});
    t.onError = () => { console.warn('モバイルオーダー印刷エラー'); };
    t.sendMessage({request: r});
}
// ▲▲▲ モバイルオーダー自動キッチン印刷 ▲▲▲

window.saveSaleToCloud = async (tableId, paymentMethod) => {
const hist = JSON.parse(localStorage.getItem('history_' + tableId) || '[]');
if(hist.length === 0) return;
const guests = parseInt(localStorage.getItem('guests_' + tableId)) || 0;
const checkin = localStorage.getItem('checkin_' + tableId) || "--:--";
let subtotal = 0, tax = 0;
hist.forEach(i => { subtotal += i.price * i.qty; tax += Math.floor(i.price * i.qty * i.rate); });

try {
    await addDoc(collection(db, "sales"), {
        tableId: tableId, guests: guests, checkin: checkin,
        checkout: new Date().getHours().toString().padStart(2, '0') + ":" + new Date().getMinutes().toString().padStart(2, '0'),
        items: hist, subtotal: subtotal, tax: tax, total: subtotal + tax,
        paymentMethod: paymentMethod || '現金',
        timestamp: Timestamp.now()
    });
} catch (e) { console.warn("売上保存失敗:", e.message); }
try { await deleteDoc(doc(db, "tables", tableId)); } catch(e) { console.warn("テーブル削除失敗:", e.message); }
await clearCountdown(tableId);
};

window.getSalesData = async (mode) => {
const now = new Date();
const snap = await getDocs(collection(db, "sales"));
let res = [];
snap.forEach(d => {
    let data = d.data(); data.id = d.id;
    const date = data.timestamp.toDate();
    if (mode === 'day' && date.toDateString() === now.toDateString()) res.push(data);
    else if (mode === 'month' && date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear()) res.push(data);
    else if (mode === 'dow') res.push(data);
    else if (mode === 'dates') res.push(data);
});
return res.sort((a,b) => b.timestamp - a.timestamp);
};

window.deleteSaleDoc = async (id) => { if(confirm("消去しますか？")) { await deleteDoc(doc(db, "sales", id)); await new Promise(r => setTimeout(r, 500)); window.showAdmin('day'); } };
window.deleteDaySales = async (label) => {
    const entry = Object.values(window._dayDeleteMap || {}).find(x => x.label === label);
    if (!entry) return alert("データが見つかりません");
    if (confirm(`${label} の${entry.ids.length}件をまとめて削除しますか？`)) {
        await Promise.all(entry.ids.map(id => deleteDoc(doc(db, "sales", id))));
        await new Promise(r => setTimeout(r, 500));
        window.showAdmin('dates');
    }
};
window.cloudDelete = async (tableId) => { await deleteDoc(doc(db, "tables", tableId)); };

// 飲み放題開始をFirestoreに書き込み（serverTimestamp使用・updatedAtと同時書き込み）
window.cloudSyncNomi = async (tableId) => {
    try {
        await setDoc(doc(db, "tables", tableId), {
            nomihodaiStart: serverTimestamp(),
            nomiTotalMinutes: NOMIHODAI_MINUTES,
            updatedAt: serverTimestamp()
        }, { merge: true });
    } catch(e) { console.warn('nomihodai開始書き込み失敗:', e.message); }
};

window.cloudSyncNomiEncho = async (tableId, totalMinutes) => {
    try {
        await setDoc(doc(db, "tables", tableId), {
            nomiTotalMinutes: totalMinutes,
            updatedAt: serverTimestamp()
        }, { merge: true });
    } catch(e) { console.warn('nomihodai延長書き込み失敗:', e.message); }
};

// 飲み放題終了をFirestoreに書き込み
window.cloudSyncNomiClear = async (tableId) => {
    try {
        await setDoc(doc(db, "tables", tableId), { nomihodaiStart: null, nomiTotalMinutes: null }, { merge: true });
    } catch(e) { console.warn('nomihodaiクリア失敗:', e.message); }
};

// サーバー時刻とのオフセット補正
</script>

async function buildPopularCategory() {
    const tablesAll = ['C-a', 'C-b', 'C-c', '01', '02', '03', '04', '05', '06', '07', 'テイクアウト', '無人'];
    const countMap = {};
    // 現在営業中テーブルのlocalStorageから集計
    tablesAll.forEach(tId => {
        const hist = JSON.parse(localStorage.getItem('history_' + tId) || '[]');
        hist.forEach(i => { countMap[i.name] = (countMap[i.name] || 0) + i.qty; });
    });
    // ログイン済みの場合のみFirestoreからも集計
    if (window.currentUser) {
        try {
            const allSales = await window.getSalesData('dow');
            allSales.forEach(s => {
                (s.items || []).forEach(i => { countMap[i.name] = (countMap[i.name] || 0) + i.qty; });
            });
        } catch(e) { console.warn("sales集計エラー:", e); }
    }

    const sorted = Object.entries(countMap).sort((a, b) => b[1] - a[1]).slice(0, 15);
    if (sorted.length === 0) return;
    const popularItems = sorted.map(([name, cnt]) => {
        const found = allCat.items.find(x => x.n === name);
        return found ? { n: found.n, p: found.p, _cnt: cnt } : null;
    }).filter(Boolean);
    const existIdx = menuData.findIndex(x => x.cat === '🔥 人気TOP15');
    const newCat = { cat: '🔥 人気TOP15', items: popularItems };
    if (existIdx >= 0) menuData[existIdx] = newCat; else menuData.splice(1, 0, newCat);
    renderSidebar();
    renderItems(menuData[0]);
}

const NOMIHODAI_ITEMS = ['飲み放題男性90分', '飲み放題女性90分'];
const NOMIHODAI_ENCHO = '飲み放題延長';
const NOMIHODAI_MINUTES = 85;
const NOMIHODAI_ENCHO_MINUTES = 30;

// 注文確定時に呼ぶ
async function startCountdownIfNeeded(tableId) {
    const hist = JSON.parse(localStorage.getItem('history_' + tableId) || '[]');
    if (!hist.some(i => NOMIHODAI_ITEMS.includes(i.name))) return;
    const enchoCnt = hist.filter(i => i.name === NOMIHODAI_ENCHO).reduce((s, i) => s + i.qty, 0);
    const totalMinutes = NOMIHODAI_MINUTES + enchoCnt * NOMIHODAI_ENCHO_MINUTES;
    if (localStorage.getItem('nomi_start_ms_' + tableId)) {
        // 延長注文 → 合計時間をFirestoreに更新
        if (window.cloudSyncNomiEncho) await window.cloudSyncNomiEncho(tableId, totalMinutes);
        return;
    }
    if (window.cloudSyncNomi) await window.cloudSyncNomi(tableId);
}

// 会計時に呼ぶ
async function clearCountdown(tableId) {
    localStorage.removeItem('nomi_start_ms_' + tableId);
    localStorage.removeItem('nomi_offset_' + tableId);
    localStorage.removeItem('nomi_total_min_' + tableId);
    delete lastAlertedTable[tableId];
    if (window.cloudSyncNomiClear) await window.cloudSyncNomiClear(tableId);
}

function getCountdownRemaining(tableId) {
    const startMs = parseInt(localStorage.getItem('nomi_start_ms_' + tableId));
    if (!startMs) return null;
    const offset = parseInt(localStorage.getItem('nomi_offset_' + tableId)) || 0;
    const totalMinutes = parseInt(localStorage.getItem('nomi_total_min_' + tableId)) || NOMIHODAI_MINUTES;
    const serverNow = Date.now() - offset;
    const elapsed = Math.floor((serverNow - startMs) / 1000);
    return totalMinutes * 60 - elapsed;
}

let alarmCtx = null;
let alarmNodes = [];

function playAlarm() {
    try {
        stopAlarm();
        alarmCtx = new (window.AudioContext || window.webkitAudioContext)();
        function beep(startTime) {
            const o = alarmCtx.createOscillator();
            const g = alarmCtx.createGain();
            o.connect(g); g.connect(alarmCtx.destination);
            o.frequency.value = 880;
            g.gain.setValueAtTime(0.6, startTime);
            g.gain.setValueAtTime(0.6, startTime + 0.6);
            g.gain.exponentialRampToValueAtTime(0.01, startTime + 0.8);
            o.start(startTime); o.stop(startTime + 0.8);
            alarmNodes.push(o);
        }
        // 30秒間繰り返しビープ
        for (let i = 0; i < 30; i++) beep(alarmCtx.currentTime + i * 1.2);
    } catch(e) {}
}

function stopAlarm() {
    if (alarmCtx) {
        alarmNodes.forEach(o => { try { o.stop(); } catch(e) {} });
        alarmNodes = [];
        alarmCtx.close();
        alarmCtx = null;
    }
}

// 1秒ごとにバッジだけ更新
function startCountdownTick() {
    if (countdownInterval) clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
        getTablesL().forEach(tId => {
            const rem = getCountdownRemaining(tId);
            if (rem === null) return;
            if (rem <= 0 && !lastAlertedTable[tId]) {
                lastAlertedTable[tId] = true;
                showAlarmModal(tId);
            }
        });
        document.querySelectorAll('.countdown-badge[data-table]').forEach(el => {
            const tId = el.getAttribute('data-table');
            const rem = getCountdownRemaining(tId);
            if (rem === null) { el.style.display = 'none'; return; }
            el.style.display = '';
            if (rem <= 0) {
                el.textContent = 'LO！';
                el.className = 'countdown-badge danger';
            } else {
                const m = Math.floor(rem / 60), s = rem % 60;
                el.textContent = `🍺 ${m}:${String(s).padStart(2,'0')}`;
                el.className = 'countdown-badge' + (rem <= 600 ? ' danger' : rem <= 1200 ? ' warning' : '');
            }
        });
    }, 1000);
}

        }
        // 決済種別内訳（menuモード以外）
        const payArea = document.getElementById('payment-summary-area');
        if (mode !== 'menu' && mode !== 'dow') {

                payMap[pm] += s.total;
            });

                `<span style="background:rgba(255,255,255,0.15); padding:4px 10px; border-radius:10px;">${k}: ¥${v.toLocaleString()}</span>`
            ).join('');

            payArea.style.display = 'none';
        }
    } catch(e) { list.innerHTML = `<p style="color:red; padding:20px;">エラー: ${e.message}</p>`; }
}

async function exportCSV() {
    // 対象月を選択
    const now = new Date();
    const options = [];
    for (let i = -11; i <= 0; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        const label = `${d.getFullYear()}年${d.getMonth()+1}月`;
        options.push({ key, label });
    }
    const chosen = await showPickerModal('CSV出力 - 対象月を選択', options.reverse());
    if (!chosen) return;
    const [selY, selM] = chosen.split('-').map(Number);
    const allSales = await window.getSalesData('dow');
    const sales = allSales.filter(s => {
        const d = s.timestamp.toDate();
        return d.getFullYear() === selY && d.getMonth()+1 === selM;
    }).sort((a, b) => a.timestamp - b.timestamp);
    if (sales.length === 0) return alert("データなし");

    const header = '日時,席,客数,入店,退店,税込合計';
    const rows = sales.map(s => {
        const d = s.timestamp.toDate();
        const dateStr = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${s.checkout}`;
        return `${dateStr},${s.tableId},${s.guests}名,${s.checkin},${s.checkout},${s.total}`;
    });
    const csv = '\uFEFF' + header + '\n' + rows.join('\n'); // BOM付きでExcel対応
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `三船売上_${selY}年${selM}月.csv`;
    a.click();
    URL.revokeObjectURL(url);
}

function showPickerModal(title, options) {
    return new Promise(resolve => {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;';
        const modal = document.createElement('div');
        modal.style.cssText = 'background:#fff;border-radius:16px;padding:24px;width:85%;max-width:340px;max-height:80vh;overflow-y:auto;';
        modal.innerHTML = `<div style="font-weight:bold;font-size:16px;margin-bottom:16px;text-align:center;">${title}</div>` +
            options.map((o, idx) => `<button data-key="${o.key}" style="width:100%;padding:14px;margin-bottom:10px;border:2px solid #eee;border-radius:12px;font-size:15px;background:#fff;cursor:pointer;">${o.label}</button>`).join('') +
            `<button data-key="cancel" style="width:100%;padding:12px;border:none;border-radius:12px;font-size:14px;background:#eee;color:#666;cursor:pointer;margin-top:4px;">キャンセル</button>`;
        modal.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.body.removeChild(overlay);
                const key = btn.getAttribute('data-key');
                resolve(key === 'cancel' ? null : key);
            });
        });
        overlay.appendChild(modal);
        document.body.appendChild(overlay);
    });
}

    document.getElementById('quick-cash-btns').innerHTML = presets.map(v =>
        `<button onclick="document.getElementById('cash-received').value=${v}; calcChange();" style="flex:1; padding:10px 0; border:1px solid #ddd; border-radius:8px; background:#f8f8f8; font-size:13px; font-weight:bold; cursor:pointer; color:var(--info);">¥${v.toLocaleString()}</button>`
    ).join('');
}

let currentPaymentMethod = '現金';
function selectPayment(method) {
    currentPaymentMethod = method;
    const map = { '現金': 'cash', 'クレジット': 'card', 'QR決済': 'qr', '電子マネー': 'ic' };
    ['cash','card','qr','ic'].forEach(k => {
        ['pay-btn-', 'co-pay-btn-'].forEach(prefix => {
            const btn = document.getElementById(prefix + k);
            if (!btn) return;
            const isSelected = map[method] === k;
            btn.style.background = isSelected ? 'var(--primary)' : '#fff';
            btn.style.color = isSelected ? '#fff' : '#333';
            btn.style.borderColor = isSelected ? 'var(--primary)' : '#ddd';
        });
    });
    // 釣銭計算エリアは現金のみ表示
    const calcArea = document.getElementById('change-calc-area');
    if (calcArea) {
        calcArea.style.display = method === '現金' ? 'block' : 'none';
        if (method === '現金') {
            document.getElementById('cash-received').value = '';
            document.getElementById('change-amount').innerText = '-';
        }
    }
}

async function pay(doPrint) {
closeReceiptChoice(); const hist = JSON.parse(localStorage.getItem('history_'+currentTable) || '[]'); const g = localStorage.getItem('guests_'+currentTable); const c = localStorage.getItem('checkin_'+currentTable);
const b = new StarWebPrintBuilder(); let r = b.createInitializationElement(); r += b.createPeripheralElement({channel: 1, pulse: 200});
if(doPrint) {
let sub8 = 0, tax8 = 0, sub10 = 0, tax10 = 0;
r += b.createAlignmentElement({position: 'center'}); r += b.createTextElement({data: `美唄焼鳥\n三船 東札幌店\n`, width: 2, height: 2}); r += b.createTextElement({data: `札幌市白石区東札幌2条3丁目9-2\nTEL: 011-816-8881\n\n`}); r += b.createAlignmentElement({position: 'left'});
r += b.createTextElement({data: `日時: ${new Date().toLocaleString()}\n席: ${currentTable} 客: ${g}名 入店: ${c}\n--------------------------------\n`});
hist.forEach(i => {
    const l = i.price * i.qty;
    const t = Math.floor(l * i.rate);
    const taxInc = l + t;
    if(i.rate === 0.08) { sub8 += l; tax8 += t; } else { sub10 += l; tax10 += t; }
    const mark = i.rate === 0.08 ? '※' : '';
    r += b.createTextElement({data: `${i.name}${mark}\n  ${i.qty}点 x ¥${i.price}    ¥${taxInc.toLocaleString()}\n`});
});
const grandTotal = sub8 + tax8 + sub10 + tax10;
r += b.createTextElement({data: `--------------------------------\n`});
r += b.createAlignmentElement({position: 'right'}); r += b.createTextElement({data: `税込合計: ¥${grandTotal.toLocaleString()}\n`, width: 2, height: 2});
r += b.createAlignmentElement({position: 'left'});
r += b.createTextElement({data: `--------------------------------\n`});
if(sub10 > 0) r += b.createTextElement({data: `10%対象: ¥${(sub10+tax10).toLocaleString()}  消費税: ¥${tax10.toLocaleString()}\n`});
if(sub8 > 0)  r += b.createTextElement({data: `※8%対象: ¥${(sub8+tax8).toLocaleString()}   消費税: ¥${tax8.toLocaleString()}\n`});
r += b.createTextElement({data: `お支払い: ${currentPaymentMethod}\n`});
if (currentPaymentMethod === '現金') {
    const received = parseInt(document.getElementById('cash-received').value) || 0;
    const grandTotal2 = sub8 + tax8 + sub10 + tax10;
    const change = received - grandTotal2;
    if (received > 0) {
        r += b.createTextElement({data: `お預かり: ¥${received.toLocaleString()}\nお釣り:   ¥${Math.max(0, change).toLocaleString()}\n`});
    }
}
r += b.createAlignmentElement({position: 'center'}); r += b.createTextElement({data: `\n[登録番号] T4430001061003\n株式会社Stag Beetle Corporation\n\n`}); r += b.createCutPaperElement({type: 'partial'});
}
const t = new StarWebPrintTrader({url: RECEIPT_PRINTER_URL}); t.onReceive = async () => { if(window.saveSaleToCloud) await window.saveSaleToCloud(currentTable, currentPaymentMethod); showIndex(); }; t.sendMessage({request: r});
}

// ▼▼▼ 領収書機能追加 ▼▼▼

function openRyoshuusho() {
    document.getElementById('ryoshuusho-atena').value = '';
    document.getElementById('ryoshuusho-tadashi').value = 'お食事代として';
    updateRyoshuushoPreview();
    document.getElementById('overlay-ryoshuusho').style.display = 'flex';
}

function closeRyoshuusho() {
    document.getElementById('overlay-ryoshuusho').style.display = 'none';
}

function getRyoshuushoTotal() {
    const hist = JSON.parse(localStorage.getItem('history_'+currentTable) || '[]');
    let sub = 0, tax = 0;
    hist.forEach(i => { sub += i.price * i.qty; tax += Math.floor(i.price * i.qty * i.rate); });
    return { sub, tax, total: sub + tax };
}

function updateRyoshuushoPreview() {
    const atena = document.getElementById('ryoshuusho-atena').value || '上様';
    const tadashi = document.getElementById('ryoshuusho-tadashi').value || 'お食事代として';
    const { sub, tax, total } = getRyoshuushoTotal();
    const now = new Date();
    const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;

    document.getElementById('ryoshuusho-preview').innerHTML =
        `<div style="text-align:center; font-weight:bold; font-size:14px; margin-bottom:6px;">領　収　書</div>` +
        `<div style="border-bottom:1px solid #000; padding-bottom:4px; margin-bottom:6px; font-size:13px;">${atena} 御中</div>` +
        `<div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:8px;"><span>金額</span><span style="font-weight:bold; font-size:16px;">¥${total.toLocaleString()}−</span></div>` +
        `<div style="font-size:11px; color:#555; margin-bottom:4px;">但し　${tadashi}</div>` +
        `<div style="font-size:11px; color:#555; margin-bottom:8px;">上記正に領収いたしました</div>` +
        `<div style="font-size:11px; color:#555; margin-bottom:6px;">${dateStr}</div>` +
        `<div style="border-top:1px dashed #999; padding-top:6px; font-size:10px; color:#888;">（内訳）税抜: ¥${sub.toLocaleString()} / 消費税: ¥${tax.toLocaleString()}</div>` +
        `<div style="font-size:11px; text-align:right; margin-top:6px;">美唄焼鳥三船 東札幌店<br>登録番号 T4430001061003</div>`;
}

function printRyoshuusho() {
    const atena = document.getElementById('ryoshuusho-atena').value || '上様';
    const tadashi = document.getElementById('ryoshuusho-tadashi').value || 'お食事代として';
    const { sub, tax, total } = getRyoshuushoTotal();
    const now = new Date();
    const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;

    const b = new StarWebPrintBuilder(); let r = b.createInitializationElement();
    r += b.createAlignmentElement({position: 'center'});
    r += b.createTextElement({data: `領　収　書\n`, width: 2, height: 2});
    r += b.createAlignmentElement({position: 'left'});
    r += b.createTextElement({data: `--------------------------------\n`});
    r += b.createTextElement({data: `${atena} 御中\n\n`});
    r += b.createTextElement({data: `金額:`, width: 1, height: 1});
    r += b.createAlignmentElement({position: 'right'});
    r += b.createTextElement({data: `¥${total.toLocaleString()}-\n`, width: 2, height: 2});
    r += b.createAlignmentElement({position: 'left'});
    r += b.createTextElement({data: `\n但し　${tadashi}\n`});
    r += b.createTextElement({data: `上記正に領収いたしました\n`});
    r += b.createTextElement({data: `${dateStr}\n`});
    r += b.createTextElement({data: `--------------------------------\n`});
    r += b.createTextElement({data: `（内訳）\n税抜合計: ¥${sub.toLocaleString()}\n消費税:   ¥${tax.toLocaleString()}\n`});
    r += b.createTextElement({data: `--------------------------------\n`});
    r += b.createAlignmentElement({position: 'center'});
    r += b.createTextElement({data: `美唄焼鳥三船 東札幌店\n札幌市白石区東札幌2条3丁目9-2\nTEL: 011-816-8881\n登録番号 T4430001061003\n\n`});
    r += b.createCutPaperElement({type: 'partial'});

    const t = new StarWebPrintTrader({url: RECEIPT_PRINTER_URL});
    t.onReceive = () => { closeRyoshuusho(); alert("領収書を印刷しました"); };
    t.onError = () => { alert("プリンター接続エラー"); };
    t.sendMessage({request: r});
}

// 宛名・但し書き変更時にプレビュー更新
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('ryoshuusho-atena').addEventListener('input', updateRyoshuushoPreview);
    document.getElementById('ryoshuusho-tadashi').addEventListener('input', updateRyoshuushoPreview);
    document.getElementById('new-table-name').addEventListener('input', function() {
        document.getElementById('name-char-count').innerText = this.value.length;
    });
    document.getElementById('new-table-name').addEventListener('keydown', function(e) {
        if(e.key === 'Enter') confirmAddTable();
    });
});

window.onload = () => { renderIndex(); startCountdownTick(); };

// 画面を開いた瞬間にも期限切れチェック
document.addEventListener('visibilitychange', () => {
    if (document.visibilityState !== 'visible') return;
    getTablesL().forEach(tId => {
        const rem = getCountdownRemaining(tId);
        if (rem === null) return;
        if (rem <= 0 && !lastAlertedTable[tId]) {
            lastAlertedTable[tId] = true;
            showAlarmModal(tId);
        }
    });
});
